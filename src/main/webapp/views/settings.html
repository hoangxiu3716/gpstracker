<!-- Settings View -->
<div style="width: 100%;">
  <!-- Appearance Settings -->
  <div class="card mb-6">
    <div class="card-header">
      <h3 class="card-title">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display: inline-block; vertical-align: middle; margin-right: 8px;"><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></svg>
        {{ 'SETTINGS.APPEARANCE' | translate }}
      </h3>
    </div>
    
    <!-- Dark Mode Toggle -->
    <div class="settings-row" style="display: flex; align-items: center; justify-content: space-between; padding: 16px 0; border-bottom: 1px solid var(--border-light);">
      <div>
        <div style="font-weight: 500; margin-bottom: 4px;" class="card-title">{{ 'SETTINGS.DARK_MODE' | translate }}</div>
        <div style="font-size: 14px; color: #6b7280;">{{ 'SETTINGS.DARK_MODE_DESC' | translate }}</div>
      </div>
      <label class="toggle-switch">
        <input type="checkbox" ng-checked="darkMode" ng-click="toggleDarkMode()">
        <span class="toggle-slider"></span>
      </label>
    </div>
    
    <!-- Language Selection -->
    <div class="settings-row" style="display: flex; align-items: center; justify-content: space-between; padding: 16px 0;">
      <div>
        <div style="font-weight: 500; margin-bottom: 4px;" class="card-title">{{ 'SETTINGS.LANGUAGE' | translate }}</div>
        <div style="font-size: 14px; color: #6b7280;">{{ 'SETTINGS.LANGUAGE_DESC' | translate }}</div>
      </div>
      <select class="form-input" style="width: 200px;" ng-model="settings.language" ng-change="changeLanguage()">
        <option ng-repeat="lang in availableLanguages" value="{{lang.code}}">{{lang.nativeName}}</option>
      </select>
    </div>
  </div>
  
  <!-- Placeholder for future settings -->
  <div class="card" style="border: 2px dashed var(--border-light); background: transparent; text-align: center; padding: 40px;">
    <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round" style="color: #9ca3af; margin: 0 auto 16px;"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>
    <p style="color: #9ca3af; font-size: 14px;">{{ 'SETTINGS.MORE_COMING' | translate }}</p>
  </div>
</div>
