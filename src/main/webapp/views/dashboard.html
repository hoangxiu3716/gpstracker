<!-- Dashboard View -->
<!-- Stats Grid -->
<div class="grid grid-cols-4 mb-6">
    <div class="stat-card" ng-repeat="stat in stats">
        <div class="stat-icon {{stat.colorClass}}">
            <svg ng-if="stat.icon=='bot'" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 8V4H8"/><rect width="16" height="12" x="4" y="8" rx="2"/><path d="M2 14h2"/><path d="M20 14h2"/><path d="M15 13v2"/><path d="M9 13v2"/></svg>
            <svg ng-if="stat.icon=='rocket'" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4.5 16.5c-1.5 1.26-2 5-2 5s3.74-.5 5-2c.71-.84.7-2.13-.09-2.91a2.18 2.18 0 0 0-2.91-.09z"/><path d="m12 15-3-3a22 22 0 0 1 2-3.95A12.88 12.88 0 0 1 22 2c0 2.72-.78 7.5-6 11a22.35 22.35 0 0 1-4 2z"/></svg>
            <svg ng-if="stat.icon=='user'" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="5"/><path d="M20 21a8 8 0 1 0-16 0"/></svg>
            <svg ng-if="stat.icon=='activity'" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
        </div>
        <div class="stat-value">{{stat.value}}</div>
        <div class="stat-label">{{stat.label}}</div>
    </div>
</div>

<!-- Main Content Grid -->
<div class="grid grid-cols-2">
    <!-- Recent Missions -->
    <div class="card">
        <div class="card-header">
            <h2 class="card-title">Recent Missions</h2>
            <button class="btn btn-secondary" ng-click="newMission()">View All</button>
        </div>
        <div class="table-container">
            <table>
                <thead>
                <tr>
                    <th>Mission ID</th>
                    <th>Status</th>
                    <th>Pilot</th>
                    <th>Progress</th>
                </tr>
                </thead>
                <tbody>
                <tr ng-repeat="mission in recentMissions">
                    <td>{{mission.id}}</td>
                    <td><span class="badge badge-{{mission.statusClass}}">{{mission.status}}</span></td>
                    <td>{{mission.pilot}}</td>
                    <td>
                        <div class="progress-bar" style="width: 100px;">
                            <div class="progress-fill" ng-style="{'width': mission.progress + '%'}"></div>
                        </div>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- AE Units Status -->
    <div class="card">
        <div class="card-header">
            <h2 class="card-title">AE Units Status</h2>
            <button class="btn btn-secondary" ng-click="addAEUnit()">Manage</button>
        </div>
        <div class="table-container">
            <table>
                <thead>
                <tr>
                    <th>Unit ID</th>
                    <th>Status</th>
                    <th>Battery</th>
                    <th>Location</th>
                </tr>
                </thead>
                <tbody>
                <tr ng-repeat="unit in aeUnits">
                    <td>{{unit.id}}</td>
                    <td><span class="badge badge-{{unit.statusClass}}">{{unit.status}}</span></td>
                    <td>{{unit.battery}}%</td>
                    <td>{{unit.location}}</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<!-- Quick Actions -->
<div class="card mt-6">
    <div class="card-header">
        <h2 class="card-title">Quick Actions</h2>
    </div>
    <div class="flex gap-4">
        <button class="btn btn-primary" ng-click="newMission()">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="M12 5v14"/></svg>
            New Mission
        </button>
        <button class="btn btn-secondary" ng-click="addAEUnit()">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 8V4H8"/><rect width="16" height="12" x="4" y="8" rx="2"/></svg>
            Add AE Unit
        </button>
        <button class="btn btn-secondary" ng-click="viewSystemStatus()">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
            System Status
        </button>
    </div>
</div>
