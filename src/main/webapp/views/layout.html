<!-- Main Layout Template -->

<!-- Loading Overlay -->
<div class="loading-overlay" ng-show="$root.showCustomLoading">
  <div class="loading-spinner-container">
    <div class="loading-spinner"></div>
    <span class="loading-text">Loading<span class="loading-dots"></span></span>
  </div>
</div>

<div class="app-container">
  <!-- Sidebar -->
  <aside class="sidebar" ng-class="{'open': sidebarOpen, 'collapsed': sidebarCollapsed}">
    <div class="sidebar-header">
      <span class="sidebar-title">{{companyName}}</span>
      <button class="sidebar-toggle" ng-click="toggleSidebar()">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" x2="6" y1="6" y2="18"/><line x1="6" x2="18" y1="6" y2="18"/></svg>
      </button>
    </div>

    <nav class="nav-main">
      <!-- Home -->
      <a ng-click="goTo('main.dashboard')" class="nav-item" ng-class="{'active': isActive('main.dashboard')}">
        <div class="nav-item-content">
          <svg class="nav-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
          <span class="nav-text" translate="NAV.HOME"></span>
        </div>
      </a>
      
      <!-- Mission Control -->
      <a ng-click="goTo('main.missioncontrol')" class="nav-item" ng-class="{'active': isActive('main.missioncontrol')}">
        <div class="nav-item-content">
          <svg class="nav-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4.5 16.5c-1.5 1.26-2 5-2 5s3.74-.5 5-2c.71-.84.7-2.13-.09-2.91a2.18 2.18 0 0 0-2.91-.09z"/><path d="m12 15-3-3a22 22 0 0 1 2-3.95A12.88 12.88 0 0 1 22 2c0 2.72-.78 7.5-6 11a22.35 22.35 0 0 1-4 2z"/></svg>
          <span class="nav-text" translate="NAV.MISSION_CONTROL"></span>
        </div>
      </a>
      
      <!-- Pilot Academy -->
      <a ng-click="goTo('main.academy')" class="nav-item" ng-class="{'active': isActive('main.academy')}">
        <div class="nav-item-content">
          <svg class="nav-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="6"/><path d="M15.477 12.89 17 22l-5-3-5 3 1.523-9.11"/></svg>
          <span class="nav-text">Pilot Academy</span>
        </div>
      </a>
      
      <!-- Data Center -->
      <a ng-click="goTo('main.datacenter')" class="nav-item" ng-class="{'active': isActive('main.datacenter')}">
        <div class="nav-item-content">
          <svg class="nav-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.21 15.89A10 10 0 1 1 8 2.83"/><path d="M22 12A10 10 0 0 0 12 2v10z"/></svg>
          <span class="nav-text">Data Center</span>
        </div>
      </a>
      
      <!-- AE Units -->
      <a ng-click="goTo('main.aeunits')" class="nav-item" ng-class="{'active': isActive('main.aeunits')}">
        <div class="nav-item-content">
          <svg class="nav-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 8V4H8"/><rect width="16" height="12" x="4" y="8" rx="2"/><path d="M2 14h2"/><path d="M20 14h2"/><path d="M15 13v2"/><path d="M9 13v2"/></svg>
          <span class="nav-text">AE Units</span>
        </div>
      </a>

      <!-- Profile Submenu -->
      <div class="has-submenu">
        <a class="nav-item" 
           ng-class="{'active': isActive('main.profile') || isActive('main.settings') || isActive('main.subscription')}"
           ng-click="toggleProfileSubmenu()">
          <div class="nav-item-content">
            <svg class="nav-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="5"/><path d="M20 21a8 8 0 1 0-16 0"/></svg>
            <span class="nav-text" translate="NAV.PROFILE"></span>
          </div>
          <svg class="submenu-arrow" ng-class="{'open': profileSubmenuOpen}" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
        </a>
        <div class="submenu" ng-class="{'open': profileSubmenuOpen}">
          <a ng-click="goTo('main.profile')" class="nav-item" ng-class="{'active': isActive('main.profile')}">
            <div class="nav-item-content">
              <svg class="nav-icon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="5"/><path d="M20 21a8 8 0 1 0-16 0"/></svg>
              <span class="nav-text" translate="NAV.PROFILE"></span>
            </div>
          </a>
          <a ng-click="goTo('main.settings')" class="nav-item" ng-class="{'active': isActive('main.settings')}">
            <div class="nav-item-content">
              <svg class="nav-icon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>
              <span class="nav-text" translate="NAV.SETTINGS"></span>
            </div>
          </a>
          <a ng-click="goTo('main.subscription')" class="nav-item" ng-class="{'active': isActive('main.subscription')}">
            <div class="nav-item-content">
              <svg class="nav-icon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="14" x="2" y="5" rx="2"/><line x1="2" x2="22" y1="10" y2="10"/></svg>
              <span class="nav-text">Subscription</span>
            </div>
          </a>
        </div>
      </div>

      <!-- Admin Submenu -->
      <div class="has-submenu" ng-show="hasRole('ROLE_ADMIN')">
        <a class="nav-item" 
           ng-class="{'active': isActive('main.administration') || isActive('main.serverHealth') || isActive('main.interfaces')}"
           ng-click="toggleAdminSubmenu()">
          <div class="nav-item-content">
            <svg class="nav-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><path d="m9 12 2 2 4-4"/></svg>
            <span class="nav-text" translate="NAV.ADMINISTRATION"></span>
          </div>
          <svg class="submenu-arrow" ng-class="{'open': adminSubmenuOpen}" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
        </a>
        <div class="submenu" ng-class="{'open': adminSubmenuOpen}">
          <a ng-click="goTo('main.administration')" class="nav-item" ng-class="{'active': isActive('main.administration')}">
            <div class="nav-item-content">
              <svg class="nav-icon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
              <span class="nav-text" translate="ADMIN.USERS"></span>
            </div>
          </a>
        </div>
      </div>
    </nav>

    <nav class="nav-bottom">
      <a class="nav-item" ng-click="logout()">
        <div class="nav-item-content">
          <svg class="nav-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" x2="9" y1="12" y2="12"/></svg>
          <span class="nav-text" translate="NAV.LOGOUT"></span>
        </div>
      </a>
    </nav>
  </aside>

  <!-- Main Content Wrapper -->
  <div class="main-wrapper">
    <!-- Gradient Bar -->
    <div class="gradient-bar"></div>

    <!-- Header -->
    <header class="header">
      <div class="flex items-center">
        <button class="header-btn mobile-menu-btn" ng-click="toggleSidebar()">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="4" x2="20" y1="12" y2="12"/><line x1="4" x2="20" y1="6" y2="6"/><line x1="4" x2="20" y1="18" y2="18"/></svg>
        </button>
        <h1 class="header-title">{{getPageTitle()}}</h1>
      </div>
      <div class="header-actions">
        <button class="header-btn" ng-click="goTo('main.profile')">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="5"/><path d="M20 21a8 8 0 1 0-16 0"/></svg>
          <span class="btn-text">{{currentUser.name}}</span>
        </button>
        <button class="header-btn" ng-click="goTo('main.about')" title="About AE.HUB">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><path d="M12 17h.01"/></svg>
        </button>
        <button class="header-btn dark-mode-toggle" ng-click="toggleDarkMode()">
          <svg ng-if="!darkMode" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>
          <svg ng-if="darkMode" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#eab308" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></svg>
        </button>
      </div>
    </header>

    <!-- Page Content -->
    <main class="main-content">
      <div ui-view></div>
    </main>
  </div>
</div>
